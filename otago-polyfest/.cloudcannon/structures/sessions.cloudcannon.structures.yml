          type: text
          comment: "e.g. 9:00am"
        group_name:
          type: text
          comment: Name of the performing group.
        stage:
          type: text
          comment: "Optional — which stage/area this session is on."
        notes:
          type: text
          comment: Optional extra notes for this session.
