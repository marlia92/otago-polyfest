sessions:
  style: modal
  values:
    - label: Session
      icon: clock
      description: A single timed performance slot.
      value:
        time: ''
        group_name: ''
        stage: ''
        notes: ''
      preview:
        text:
          - key: time
          - Add time
        subtext:
          - key: group_name
          - Add group name
      picker_preview:
        text: Session
        subtext: A single timed performance slot.
        icon: clock
      _inputs:
